name: iOS build (unsigned)

# CocoaPods-based (ios/App/Podfile), matching the Codemagic ios-unsigned-build
# workflow (see ../../codemagic.yaml). GoogleService-Info.plist is committed
# at ios/App/App/GoogleService-Info.plist, so no secret decode step is needed.

on:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    env:
      # URL the Capacitor shell loads. Set this secret to point the build at a
      # specific frontend deploy (Vercel preview, prod, etc).
      CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec cap sync ios
      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install
      - name: Build for simulator (no code signing)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
      - uses: actions/upload-artifact@v4
        with:
          name: App-simulator-debug
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 14
